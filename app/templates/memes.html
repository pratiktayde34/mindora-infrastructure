<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mindora Memes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap (if already used in project) -->
    <link rel="stylesheet" href="assets/vendor/bootstrap/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f2f0ff;
            font-family: 'Poppins', sans-serif;
        }

        .meme-container {
            max-width: 600px;
            margin: auto;
            margin-top: 60px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .meme-container img {
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
        }

        .meme-title {
            font-weight: 600;
            font-size: 18px;
            color: #2C3E50;
        }

        .btn-meme {
            margin-top: 20px;
            background-color: #4A90E2;
            border: none;
        }

        .btn-meme:hover {
            background-color: #357ABD;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="meme-container">

        <div class="meme-title" id="meme-title">
            Loading meme...
        </div>

        <img id="meme-image" src="" alt="Meme">

        <button class="btn btn-primary btn-meme" onclick="loadMeme()">
            Change Meme 😈
        </button>

    </div>
</div>

<script>
async function loadMeme() {

    const title = document.getElementById("meme-title");
    const image = document.getElementById("meme-image");

    title.innerText = "Loading meme...";

    try {
        const response = await fetch("https://meme-api.com/gimme");
        const data = await response.json();

        title.innerText = data.title;
        image.src = data.url;

    } catch (error) {
        console.error(error);
        title.innerText = "Failed to load meme 😢";
    }
}

loadMeme();
</script>

</body>
</html>
