
services:
  mindora:
    image: pratiktayde/mindora:test
    container_name: mindora
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - appnet

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
